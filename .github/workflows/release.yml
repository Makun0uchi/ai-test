name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: services.account_service.app.main:app
            image_name: account-service
          - module: services.hospital_service.app.main:app
            image_name: hospital-service
          - module: services.timetable_service.app.main:app
            image_name: timetable-service
          - module: services.document_service.app.main:app
            image_name: document-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image repository
        id: prep
        run: |
          IMAGE_REPOSITORY=$(echo "ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}" | tr '[:upper:]' '[:lower:]')
          echo "image_repository=${IMAGE_REPOSITORY}" >> "${GITHUB_OUTPUT}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_repository }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          build-args: |
            APP_MODULE=${{ matrix.module }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    runs-on: ubuntu-latest
    needs: publish-images

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from changelog
        run: |
          python scripts/extract_release_notes.py \
            --changelog CHANGELOG.md \
            --version "${GITHUB_REF_NAME#v}" \
            --output release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
